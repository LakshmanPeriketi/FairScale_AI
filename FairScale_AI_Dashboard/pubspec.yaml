version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  http: ^1.6.0
  flutter_dotenv: ^5.1.0
  firebase_core: ^4.7.0
